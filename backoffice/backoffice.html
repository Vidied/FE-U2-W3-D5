<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="d-flex flex-column vh-100">
    <header class="mb-3">
      <nav class="nav justify-content-center">
        <a class="nav-link active" href="../home/home.html" aria-current="page"
          >Home</a
        >
        <a class="nav-link" href="../backoffice/backoffice.html">Backoffice</a>
      </nav>
    </header>
    <main class="container mt-4 flex-grow-1">
      <section class="row justify-content-center">
        <article class="col-12 col-md-10 col-lg-8 col-xl-6">
          <form id="product-form" class="d-flex flex-column gap-2">
            <label for="productName">Nome prodotto</label>
            <input required id="productName" type="text" class="mb-2" />
            <label for="description">Descrizione prodotto</label>
            <input required id="description" type="text" class="mb-2" />
            <label for="brand">brand</label>
            <input required id="brand" type="text" class="mb-2" />
            <label for="imageUrl">Link immagine</label>
            <input required id="imageUrl" type="text" class="mb-2" />
            <label for="price">Prezzo</label>
            <input required id="price" type="text" class="mb-2" />
            <div class="text-center mt-3">
              <button type="submit" class="me-2 btn btn-primary">
                Crea prodotto
              </button>
              <button type="reset" class="btn btn-danger">RESET</button>
            </div>
          </form>
        </article>
      </section>
    </main>
    <footer>
      <div class="text-center">
        <p><span id="year"></span> - PokèCards shop</p>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./backoffice.js"></script>
  </body>
</html>
